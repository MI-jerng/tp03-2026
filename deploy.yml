---
- name: Deploy Laravel Project
  hosts: webserver
  vars:
    student_name: "sav-moeng" 
    app_path: "/var/www/{{ student_name }}"

  tasks:
    - name: Ensure the directory exists
      file:
        path: "{{ app_path }}"
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Archive project locally
      delegate_to: localhost
      # Strict order: options -> file -> source
      shell: "tar --exclude=.git --exclude=node_modules --exclude=vendor -czf /tmp/project.tar.gz ."

    - name: Upload and extract the project
      unarchive:
        src: /tmp/project.tar.gz
        dest: "{{ app_path }}"
        owner: www-data
        group: www-data