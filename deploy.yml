---
- name: Deploy Laravel Project
  hosts: webserver
  vars:
    student_name: "sav-moeng" 
    app_path: "/var/www/{{ student_name }}"

  tasks:
    - name: Ensure the directory for my name exists
      file:
        path: "{{ app_path }}"
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Copy files to server
      copy:
        src: "./"
        dest: "{{ app_path }}/"
        owner: www-data
        group: www-data
        mode: '0644'